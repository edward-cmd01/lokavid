                <h2>关于我</h2>
                <p>我是一名中国社会纪实摄影师，长期关注社会话题与公共问题，通过镜头记录时代的变迁与人们的生活状态。</p>
                <p>我的作品聚焦于城市公共空间、乡村纪实、社会变迁等主题，试图以客观而富有温度的视角，呈现当代中国的社会图景。</p>
                <p>摄影对我而言，不仅是记录，更是一种观察与思考的方式。我相信，每一张照片都承载着特定时空下的故事，而这些故事值得被看见、被记住。</p>
