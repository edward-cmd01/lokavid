<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="后台管理系统">
    <title>后台管理 | 摄影师</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1 class="admin-title">后台管理</h1>
            <nav class="admin-nav">
                <a href="index.html">首页</a>
                <a href="#site-settings">网站设置</a>
                <a href="#about-settings">简介</a>
                <a href="#contact-settings">联系方式</a>
                <a href="#projects-settings">项目管理</a>
                <a href="index.html" target="_blank">查看网站</a>
            </nav>
        </header>

        <section id="site-settings" class="admin-section">
            <h2 class="admin-section-title">网站设置</h2>
            <div class="form-group">
                <label class="form-label">网站名称</label>
                <input type="text" id="siteName" class="form-input" placeholder="摄影师名称">
            </div>
            <div class="form-group">
                <label class="form-label">上传网站logo图片（支持SVG和PNG格式）</label>
                <div class="upload-area" onclick="document.getElementById('logoImageUpload').click()">
                    <input type="file" id="logoImageUpload" accept="image/svg+xml,image/png" style="display: none;">
                    <p class="upload-area-text">点击或拖拽文件到此处上传</p>
                    <p id="logoImageUploadStatus" style="font-size: 0.75rem; color: #666; margin-top: 0.5rem;"></p>
                </div>
                <input type="hidden" id="logoImageInput" value="">
                <div id="logoImagePreview" style="margin-top: 1rem; display: none;">
                    <img id="logoImagePreviewImg" src="" alt="预览" style="max-width: 200px; max-height: 60px; filter: grayscale(100%);">
                    <button type="button" class="btn btn-sm btn-outline" onclick="removeLogoImage()" style="margin-top: 0.5rem;">删除图片</button>
                </div>
                <p style="font-size: 0.75rem; color: #666; margin-top: 0.5rem;">注：如果上传了logo图片，将优先显示图片logo，否则显示文字logo</p>
            </div>
            <div class="form-group">
                <label class="form-label">副标题</label>
                <input type="text" id="siteSubtitle" class="form-input" placeholder="如：DOCUMENTARY PHOTOGRAPHER">
            </div>
            <div class="form-group">
                <label class="form-label">上传首页背景图片</label>
                <div class="upload-area" onclick="document.getElementById('heroImageUpload').click()">
                    <input type="file" id="heroImageUpload" accept="image/*" style="display: none;">
                    <p class="upload-area-text">点击或拖拽文件到此处上传</p>
                    <p id="heroImageUploadStatus" style="font-size: 0.75rem; color: #666; margin-top: 0.5rem;"></p>
                </div>
                <input type="hidden" id="heroImageInput" value="">
                <div id="heroImagePreview" style="margin-top: 1rem; display: none;">
                    <img id="heroImagePreviewImg" src="" alt="预览" style="max-width: 200px; max-height: 100px; filter: grayscale(100%);">
                    <button type="button" class="btn btn-sm btn-outline" onclick="removeHeroImage()" style="margin-top: 0.5rem;">删除图片</button>
                </div>
            </div>
            <button class="btn" onclick="saveSiteSettings()">保存设置</button>
        </section>

        <section id="about-settings" class="admin-section">
            <h2 class="admin-section-title">简介设置</h2>
            <div class="form-group">
                <label class="form-label">个人照片</label>
                <input type="text" id="aboutPhotoInput" class="form-input" value="" style="display: none;">
                <div style="margin-bottom: 1rem;">
                    <img id="aboutPhotoPreview" src="images/portrait.svg" alt="个人照片预览" style="max-width: 200px; max-height: 200px; filter: grayscale(100%);">
                </div>
                <div class="upload-area" onclick="document.getElementById('aboutPhotoUpload').click()" style="margin-bottom: 1rem;">
                    <input type="file" id="aboutPhotoUpload" accept="image/*" style="display: none;">
                    <p style="text-align: center; padding: 1rem; border: 2px dashed #ddd; cursor: pointer; font-size: 0.875rem;">点击或拖拽文件到此处上传个人照片</p>
                </div>
                <div id="aboutPhotoUploadStatus" class="upload-status"></div>
                <div style="margin-top: 0.5rem;">
                    <button type="button" class="btn btn-sm btn-outline" onclick="removeAboutPhoto()">删除图片</button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">简介内容（支持HTML）</label>
                <textarea id="aboutContent" class="form-textarea" placeholder="输入简介内容..."></textarea>
            </div>
            <button class="btn" onclick="saveAboutSettings()">保存简介</button>
        </section>

        <section id="contact-settings" class="admin-section">
            <h2>联系设置</h2>
            <div class="form-group">
                <label class="form-label">邮箱</label>
                <input type="email" id="contactEmail" class="form-input" placeholder="contact@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">小红书账号</label>
                <input type="text" id="contactXiaohongshu" class="form-input" placeholder="@摄影师NIU">
            </div>
            <div class="form-group">
                <label class="form-label">小红书链接</label>
                <input type="url" id="contactXiaohongshuLink" class="form-input" placeholder="https://www.xiaohongshu.com/user/profile/...">
            </div>
            <div class="form-group">
                <label class="form-label">微博账号</label>
                <input type="text" id="contactWeibo" class="form-input" placeholder="@摄影师NIU">
            </div>
            <div class="form-group">
                <label class="form-label">微博链接</label>
                <input type="url" id="contactWeiboLink" class="form-input" placeholder="https://weibo.com/...">
            </div>
            <button class="btn" onclick="saveContactSettings()">保存设置</button>
        </section>
        
        <section id="cloud-settings" class="admin-section">
            <h2>云服务设置</h2>
            <div class="form-group">
                <label class="form-label">启用云服务</label>
                <input type="checkbox" id="cloudEnabled" class="form-checkbox">
            </div>
            <div class="form-group">
                <label class="form-label">API地址</label>
                <input type="url" id="cloudApiUrl" class="form-input" placeholder="https://api.example.com">
            </div>
            <div class="form-group">
                <label class="form-label">API密钥</label>
                <input type="text" id="cloudApiKey" class="form-input" placeholder="Your API Key">
            </div>
            <div class="form-group">
                <label class="form-label">同步间隔（秒）</label>
                <input type="number" id="cloudSyncInterval" class="form-input" min="30" max="3600" value="60">
            </div>
            <div id="cloudStatus" style="margin: 1rem 0; padding: 0.5rem; background: #f5f5f5; border-radius: 4px;">
                <p>云服务状态：<span id="cloudStatusText">未启用</span></p>
                <p>最后同步：<span id="cloudLastSync">从未</span></p>
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <button class="btn" onclick="saveCloudSettings()">保存云服务设置</button>
                <button class="btn btn-outline" onclick="syncToCloud()">立即同步到云</button>
                <button class="btn btn-outline" onclick="syncFromCloud()">从云同步</button>
                <button class="btn btn-outline" onclick="migrateToCloud()">迁移到云</button>
            </div>
        </section>

        <section id="projects-settings" class="admin-section">
            <h2 class="admin-section-title">项目管理</h2>
            <div class="projects-list" id="projectsList"></div>
            <div style="margin-top: 1.5rem;">
                <button class="btn" onclick="addNewProject()">添加新项目</button>
                <button class="btn btn-outline" onclick="resetToDefault()" style="margin-left: 0.5rem;">重置所有数据</button>
            </div>
        </section>

        <section id="project-edit-form" class="admin-section" style="display: none;">
            <h2 class="admin-section-title">编辑项目</h2>
            <input type="hidden" id="editProjectIndex">
            <div class="form-group">
                <label class="form-label">项目ID（用于URL，英文）</label>
                <input type="text" id="projectId" class="form-input" placeholder="urban-public-space">
            </div>
            <div class="form-group">
                <label class="form-label">项目标题</label>
                <input type="text" id="projectTitle" class="form-input" placeholder="城市公共空间">
            </div>
            <div class="form-group">
                <label class="form-label">年份</label>
                <input type="text" id="projectYear" class="form-input" placeholder="2023">
            </div>
            
            <input type="text" id="projectCover" class="form-input" placeholder="images/cover.jpg" style="display: none;">

            <div class="form-group">
                <label class="form-label">项目描述</label>
                <textarea id="projectDescription" class="form-textarea" placeholder="项目描述..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">上传图片（从本地上传）</label>
                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
                    <p class="upload-area-text">点击或拖拽文件到此处上传</p>
                    <p id="uploadStatus" style="font-size: 0.75rem; color: #666; margin-top: 0.5rem;"></p>
                </div>
                <textarea id="projectImages" class="form-textarea" placeholder="图片路径会自动添加" style="display: none;"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">已上传图片</label>
                <div id="projectImagesList" style="display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1rem;">
                    <!-- 图片列表将在这里动态生成 -->
                </div>
            </div>
            <button class="btn" onclick="saveProject()">保存项目</button>
            <button class="btn btn-outline" onclick="cancelEditProject()" style="margin-left: 0.5rem;">取消</button>
        </section>
    </div>

    <script src="js/main.js"></script>
    <script src="js/cloud-service.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
